version: '3.8'
services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: ecommerce_events
    command: ["postgres", "-c", "wal_level=logical"]
    profiles: ['core','side']
    ports:
      - "5432:5432"
    volumes:
      - /home/elmir/de-project/data-binds/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d ecommerce_events"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.9
    container_name: pgadmin_ui
    profiles: [ 'side' ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "8080:80"
    volumes:
      - /home/elmir/de-project/data-binds/pgadmin:/var/lib/pgadmin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: [ 'core' ]
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - /home/elmir/de-project/data-binds/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    profiles: [ 'core' ]
    container_name: schema_registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    profiles: [ 'side' ]
    container_name: kafka_connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: debezium-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: debezium_connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt debezium/debezium-connector-postgresql:2.5.4
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    profiles: [ 'side' ]
    container_name: kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083


  spark-master: &spark-common
    build: .
    container_name: spark_master
    profiles: [ 'core' ]
    entrypoint: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master" ]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8085
    ports:
      - "7077:7077"
      - "8085:8085"
    volumes:
      - ./spark-jobs:/opt/spark/work-dir/spark-jobs
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8085 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  spark-worker-1:
    <<: *spark-common
    container_name: spark_worker_1
    profiles: [ 'core' ]
    entrypoint: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077" ]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_CORES: 3
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_WEBUI_PORT: 8086
      SPARK_WORKER_LOG_DIR: /opt/spark/logs

    volumes:
      - /home/elmir/de-project/data-binds/spark/jars:/opt/spark/jars/extra
    ports:
      - "8086:8086"

  spark-worker-2:
    <<: *spark-common
    container_name: spark_worker_2
    profiles: [ 'core' ]
    entrypoint: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077" ]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_CORES: 3
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_WEBUI_PORT: 8087
      SPARK_WORKER_LOG_DIR: /opt/spark/logs
    volumes:
      - /home/elmir/de-project/data-binds/spark/jars:/opt/spark/jars/extra
    ports:
      - "8087:8087"

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.3
    container_name: jupyter_pyspark
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: "dev"
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
    volumes:
      - ./data-binds/spark/jars:/opt/extra-jars
    depends_on:
      spark-master:
        condition: service_healthy
    profiles: [ "side" ]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    profiles: [ 'core' ]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - /home/elmir/de-project/data-binds/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5



  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive_metastore
    profiles: [ 'core' ]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=myuser
        -Djavax.jdo.option.ConnectionPassword=mypass
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.access.key=minioadmin
        -Dfs.s3a.secret.key=minioadmin
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    volumes:
      - /home/elmir/de-project/data-binds/hive:/opt/hive/data
      - /home/elmir/de-project/data-binds/hive/lib/postgresql-42.7.3.jar:/opt/hive/lib/postgresql.jar
      - /home/elmir/de-project/data-binds/spark/jars/hadoop-aws-3.3.4.jar:/opt/hive/lib/hadoop-aws-3.3.4.jar
      - /home/elmir/de-project/data-binds/spark/jars/aws-java-sdk-bundle-1.12.262.jar:/opt/hive/lib/aws-java-sdk-bundle-1.12.262.jar
      - /home/elmir/de-project/data-binds/hive/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9083'" ]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 60s

  trino:
    image: trinodb/trino:435
    container_name: trino
    profiles: [ 'core' ]
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8088:8080"   # Web UI + JDBC/HTTP API
    volumes:
      - ./trino-catalog:/etc/trino/catalog
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/v1/info || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s


  hue:
    image: gethue/hue:20251008-140101
    container_name: hue
    profiles: [ 'side' ]
    ports:
      - "8889:8888"
    volumes:
      - /home/elmir/de-project/data-binds/hue/hue.ini:/usr/share/hue/desktop/conf/hue.ini

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    profiles: [ 'core' ]
    command: standalone
    depends_on:
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://myuser:mypass@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'airflowsecret123'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: Admin
      _AIRFLOW_WWW_USER_ROLE: Admin
      _AIRFLOW_WWW_USER_EMAIL: admin@admin.com
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      SPARK_HOME: /home/airflow/.local/lib/python3.8/site-packages/pyspark
    volumes:
      - /home/elmir/de-project/dags:/opt/airflow/dags
      - /home/elmir/de-project/spark-jobs:/opt/airflow/spark-jobs
      - /home/elmir/de-project/data-binds/spark/jars:/opt/spark/jars
    ports:
      - "8091:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s







